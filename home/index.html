<!DOCTYPE html>
<html lang="en">
<head>
    <title>Home - HiAnime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .anime-card img { aspect-ratio: 2/3; object-fit: cover; width: 100%; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ffbade; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#12131a] text-white pb-10">

    <header class="sticky top-0 z-50 bg-[#12131a]/95 backdrop-blur-sm border-b border-white/5 p-4">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            <a href="../index.html"><img src="https://hianimes.se/assets/logo.png" class="h-8"></a>
            
            <div class="relative w-[500px]">
                <input type="text" id="search-input" autocomplete="off" placeholder="Search anime..." class="w-full bg-white text-black py-2 px-5 rounded-xl outline-none">
                
                <div id="search-results" class="absolute top-full left-0 w-full mt-2 bg-[#242530] rounded-xl shadow-2xl hidden flex-col max-h-[400px] overflow-y-auto z-50"></div>
            </div>
        </div>
    </header>

    <main class="max-w-[1200px] mx-auto px-4 mt-10">
        <h2 class="text-2xl font-bold border-l-4 border-[#ffbade] pl-4 mb-6">Recently Added</h2>
        
        <div id="anime-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5"></div>

        <div id="pagination" class="mt-10 flex justify-center gap-4"></div>
    </main>

    <script>
        let animeData = [];
        let currentPage = 1;
        const itemsPerPage = 15; 

        // Load JSON Data
        fetch('/data/anime-list.json')
            .then(res => res.json())
            .then(data => { animeData = data; renderPage(1); });

        function renderPage(page) {
            const start = (page - 1) * itemsPerPage;
            const grid = document.getElementById('anime-grid');
            
            grid.innerHTML = animeData.slice(start, start + itemsPerPage).map(a => `
                <div class="bg-[#242530] rounded-xl overflow-hidden cursor-pointer hover:-translate-y-1 transition" onclick="location.href='../anime.html?id=${a.id}'">
                    <div class="relative">
                        <img src="${a.image}" alt="${a.title}">
                        <div class="absolute bottom-2 left-2 bg-[#ffbade] text-black text-[10px] font-bold px-2 py-1 rounded">HD Sub</div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm truncate hover:text-[#ffbade]">${a.title}</h3>
                    </div>
                </div>
            `).join('');
            renderPagination();
        }

        function renderPagination() {
            const total = Math.ceil(animeData.length / itemsPerPage);
            const pagDiv = document.getElementById('pagination');
            pagDiv.innerHTML = `
                ${currentPage > 1 ? `<button onclick="changePage(${currentPage-1})" class="px-6 py-2 bg-[#242530] hover:bg-[#ffbade] hover:text-black font-bold rounded-lg transition">⬅ Prev</button>` : ''}
                ${currentPage < total ? `<button onclick="changePage(${currentPage+1})" class="px-6 py-2 bg-[#242530] hover:bg-[#ffbade] hover:text-black font-bold rounded-lg transition">Next ➡</button>` : ''}
            `;
        }

        function changePage(p) { currentPage = p; renderPage(p); window.scrollTo(0,0); }

        // Search Logic
        const input = document.getElementById('search-input');
        const box = document.getElementById('search-results');
        
        input.addEventListener('input', () => {
            const q = input.value.toLowerCase();
            if(!q) { box.classList.add('hidden'); box.classList.remove('flex'); return; }

            const filtered = animeData.filter(a => a.title.toLowerCase().includes(q)).slice(0,8);
            box.classList.remove('hidden'); box.classList.add('flex');
            
            box.innerHTML = filtered.length ? filtered.map(a => `
                <div onclick="location.href='../anime.html?id=${a.id}'" class="flex items-center gap-4 p-3 hover:bg-[#1a1a2e] cursor-pointer border-b border-white/5">
                    <img src="${a.image}" class="w-10 h-14 object-cover rounded">
                    <h4 class="text-sm font-semibold">${a.title}</h4>
                </div>
            `).join('') : `<div class="p-4 text-center text-gray-500">No results found</div>`;
        });
    </script>
</body>
</html>
