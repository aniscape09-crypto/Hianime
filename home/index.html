<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiAnime - Watch Anime Online, Free Anime Streaming Online (official)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffbade;
            --primary-hover: #ee559ce5;
            --bg-body: #12131a;
            --bg-card: #242530;
            --text-gray: #ccc;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-body);
            color: #ffffff;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Hero Slider Styling */
        .hero-slider {
            position: relative;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
        }

        .hero-backdrop {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.5;
        }

        .hero-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(18, 19, 26, 1) 0%, rgba(18, 19, 26, 0.6) 40%, transparent 100%);
        }

        /* Anime Card Styling */
        .anime-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .anime-card:hover {
            transform: translateY(-5px);
        }

        .anime-card img {
            aspect-ratio: 2/3;
            object-fit: cover;
            width: 100%;
        }

        .badge-ep {
            background: var(--primary);
            color: #12131a;
            font-weight: 700;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .badge-sub {
            background: #fff;
            color: #12131a;
            font-weight: 700;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Sidebar Tabs */
        .tab-btn.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Navigation transitions */
        .nav-link { transition: color 0.2s; }
        .nav-link:hover { color: var(--primary); }
        
        .btn-pink {
            background: var(--primary);
            color: #12131a;
            transition: 0.3s;
        }
        .btn-pink:hover {
            background: var(--primary-hover);
            color: #fff;
        }
    </style>
</head>
<body class="pb-10">

    <header class="sticky top-0 z-50 bg-[#12131a]/95 backdrop-blur-sm border-b border-white/5">
        <div class="max-w-[1400px] mx-auto px-4 flex items-center justify-between h-20">
            <div class="flex items-center gap-6">
                <button class="lg:hidden text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <a href="../index.html"><img src="https://hianimes.se/assets/logo.png" alt="logo" class="h-10 w-auto" /></a>
            </div>

            <div class="hidden md:flex flex-1 max-w-2xl mx-10">
                <div class="relative w-full z-50">
                    <input type="text" id="search-input" autocomplete="off" placeholder="Search anime..." class="w-full bg-white text-black py-2.5 px-5 rounded-l-xl outline-none focus:ring-2 focus:ring-pink-300">
                    <button class="absolute right-0 top-0 h-full btn-pink px-5 rounded-r-xl">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </button>
                    <div id="search-results" class="absolute top-full left-0 w-full mt-2 bg-[#242530] rounded-xl shadow-2xl overflow-hidden hidden flex-col max-h-[400px] overflow-y-auto border border-white/10">
                        </div>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button class="bg-white/10 hover:bg-white/20 p-2.5 rounded-xl transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </button>
            </div>
        </div>
        
        <nav class="max-w-[1400px] mx-auto px-4 pb-4">
            <ul class="flex flex-wrap items-center gap-6 text-[14px] font-medium text-gray-300">
                <li><a href="../index.html" class="nav-link text-[#ffbade]">Home</a></li>
                <li><a href="#" class="nav-link">Most Popular</a></li>
                <li><a href="#" class="nav-link">Movies</a></li>
                <li><a href="#" class="nav-link">TV Series</a></li>
            </ul>
        </nav>
    </header>

    <main class="max-w-[1400px] mx-auto px-4 mt-6">
        
        <section class="mb-10">
            <div class="hero-slider">
                <div class="hero-backdrop" style="background-image: url('https://9anime.org.lv/wp-content/uploads/2024/08/One-Piece-cover-new-1.webp');"></div>
                <div class="hero-gradient"></div>
                <div class="relative h-full flex flex-col justify-center px-10 md:px-20 max-w-2xl">
                    <span class="text-[#ffbade] font-bold text-sm mb-2">#1 Spotlight</span>
                    <h1 class="text-4xl md:text-5xl font-bold mb-4 line-clamp-2">One Piece</h1>
                    <p class="text-gray-300 text-sm mb-8 line-clamp-3">Gold Roger was known as the "Pirate King", the strongest and most infamous being to have sailed the Grand Line...</p>
                    <div class="flex items-center gap-4">
                        <button class="btn-pink px-8 py-3 rounded-xl font-bold flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                            </svg>
                            Watch Now
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <div class="flex-1 space-y-12">
                
                <section id="posts-section">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold border-l-4 border-[#ffbade] pl-4">Recently Added</h2>
                    </div>
                    
                    <div id="anime-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-4">
                        </div>

                    <div id="pagination" class="mt-10 flex justify-center gap-4">
                        </div>
                </section>
            </div>

            <aside class="w-full lg:w-[320px] space-y-10">
                <div class="bg-white/5 rounded-2xl p-6">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#ffbade]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>
                        Quick Filter
                    </h3>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <div class="bg-black/30 p-2 rounded hover:text-[#ffbade] transition cursor-pointer">Action</div>
                        <div class="bg-black/30 p-2 rounded hover:text-[#ffbade] transition cursor-pointer">Adventure</div>
                        <div class="bg-black/30 p-2 rounded hover:text-[#ffbade] transition cursor-pointer">Comedy</div>
                        <div class="bg-black/30 p-2 rounded hover:text-[#ffbade] transition cursor-pointer">Fantasy</div>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <footer class="mt-20 border-t border-white/5 bg-[#1a1b26]">
        <div class="max-w-[1400px] mx-auto px-4 py-12 text-center text-xs text-gray-500">
            <p>Copyright © 2026 HiAnime. All Rights Reserved</p>
        </div>
    </footer>

    <script>
        let animeData = [];
        let currentPage = 1;
        const itemsPerPage = 15; // Shows 15 items per page (perfect for 5 columns)

        // 1. Fetch data ONCE when page loads (Make sure data/anime-list.json exists!)
        fetch('/data/anime-list.json')
            .then(res => res.json())
            .then(data => {
                animeData = data;
                renderPage(currentPage);
            })
            .catch(err => console.error("Error loading JSON. Make sure you created /data/anime-list.json"));

        // 2. Render Grid Function (Uses your exact CSS card design)
        function renderPage(page) {
            const startIndex = (page - 1) * itemsPerPage;
            const currentItems = animeData.slice(startIndex, startIndex + itemsPerPage);
            const grid = document.getElementById('anime-grid');
            
            grid.innerHTML = currentItems.map(a => `
                <div class="anime-card group relative cursor-pointer" onclick="location.href='../anime.html?id=${a.id}'">
                    <div class="relative">
                        <img src="${a.image}" alt="${a.title}">
                        <div class="absolute bottom-2 left-2 flex gap-1">
                            <span class="badge-ep">HD</span>
                            <span class="badge-sub">Sub</span>
                        </div>
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <div class="p-3 bg-[#ffbade] rounded-full text-black">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                                </svg>
                            </div>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm line-clamp-2 hover:text-[#ffbade] transition">${a.title}</h3>
                    </div>
                </div>
            `).join('');

            renderPagination();
        }

        // 3. Render Next/Prev Buttons
        function renderPagination() {
            const totalPages = Math.ceil(animeData.length / itemsPerPage);
            const pagDiv = document.getElementById('pagination');
            let html = '';
            
            if (currentPage > 1) {
                html += `<button onclick="changePage(${currentPage - 1})" class="px-6 py-2 bg-[#242530] hover:bg-[#ffbade] hover:text-black font-bold rounded-lg transition">⬅ Previous</button>`;
            }
            if (currentPage < totalPages) {
                html += `<button onclick="changePage(${currentPage + 1})" class="px-6 py-2 bg-[#242530] hover:bg-[#ffbade] hover:text-black font-bold rounded-lg transition">Next ➡</button>`;
            }
            pagDiv.innerHTML = html;
        }

        function changePage(newPage) {
            currentPage = newPage;
            renderPage(currentPage);
            document.getElementById('posts-section').scrollIntoView({ behavior: 'smooth' });
        }

        // 4. Instant Search Logic (HiAnime Dropdown Style)
        const searchInput = document.getElementById('search-input');
        const resultsBox = document.getElementById('search-results');

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase();
            
            if(!query) { 
                resultsBox.classList.add('hidden');
                resultsBox.classList.remove('flex');
                return; 
            }

            const filtered = animeData.filter(a => a.title.toLowerCase().includes(query)).slice(0, 8);
            
            if(filtered.length > 0) {
                resultsBox.classList.remove('hidden');
                resultsBox.classList.add('flex');
                
                resultsBox.innerHTML = filtered.map(a => `
                    <div onclick="location.href='../anime.html?id=${a.id}'" class="flex items-center gap-4 p-3 hover:bg-[#12131a] cursor-pointer border-b border-white/5 transition">
                        <img src="${a.image}" class="w-10 h-14 object-cover rounded">
                        <div>
                            <h4 class="text-sm font-semibold text-gray-200">${a.title}</h4>
                            <span class="text-[10px] text-gray-500">Sub/Dub</span>
                        </div>
                    </div>
                `).join('');
            } else {
                resultsBox.classList.remove('hidden');
                resultsBox.classList.add('flex');
                resultsBox.innerHTML = `<div class="p-4 text-sm text-gray-500 text-center">No results found</div>`;
            }
        });

        // Hide search results if clicked outside
        document.addEventListener('click', (e) => {
            if(!searchInput.contains(e.target) && !resultsBox.contains(e.target)) {
                resultsBox.classList.add('hidden');
                resultsBox.classList.remove('flex');
            }
        });
    </script>
</body>
</html>
