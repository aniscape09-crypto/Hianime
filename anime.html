<!DOCTYPE html>
<html>
<head>
<title>Watch Anime - HiAnime</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f0f0f] text-white font-sans">

  <div class="p-5 bg-[#1a1a1a] flex justify-between">
    <div class="font-bold text-xl text-pink-500">HiAnime</div>
    <a href="home/index.html" class="hover:text-pink-400">Back to Home</a>
  </div>

  <div class="max-w-[1000px] mx-auto p-5 flex gap-5 mt-5">
    
    <div class="w-[200px] shrink-0">
      <img id="poster" src="" class="w-full rounded-lg shadow-lg">
    </div>

    <div class="flex-1">
      <h1 id="title" class="text-3xl font-bold mb-4">Loading...</h1>
      <div id="player" class="w-full bg-black rounded-lg overflow-hidden border border-gray-800">
        </div>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const animeId = params.get("id");

    if(animeId){
      fetch(`/data/posts/${animeId}.json`)
        .then(res => res.json())
        .then(data => {
          document.getElementById("title").innerText = data.title;
          document.getElementById("poster").src = data.image;
          document.getElementById("player").innerHTML = 
            `<iframe src="${data.iframe}" width="100%" height="450" frameborder="0" allowfullscreen></iframe>`;
        })
        .catch(() => {
          document.getElementById("title").innerText = "Anime not found!";
        });
    }
  </script>

</body>
</html>
