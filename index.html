<!DOCTYPE html>
<html>
<head>
<title>HiAnime</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(180deg,#1a1a2e,#0f0f1a);
  color:white;
}

/* NAVBAR */
.nav {
  display:flex;
  justify-content:center;
  gap:40px;
  padding:20px;
  font-size:15px;
}

.nav a {
  color:white;
  text-decoration:none;
}

/* HERO SECTION */
.hero {
  max-width:1200px;
  height:420px; /* FIXED HEIGHT like hianime */
  margin:40px auto;
  border-radius:20px;
  overflow:hidden;
  display:flex;
  background:#1e1e2f;
}

/* LEFT SIDE */
.left {
  width:50%;
  padding:40px 50px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  z-index:2;
}

/* LOGO IMAGE */
.logo-img {
  width:180px;
  margin-bottom:20px;
}

/* SEARCH */
.search-box {
  display:flex;
  margin-bottom:15px;
}

.search-box input {
  width:320px;
  padding:12px;
  border:none;
  border-radius:10px 0 0 10px;
  font-size:14px;
}

.search-box button {
  padding:12px 16px;
  border:none;
  background:#ff6fa5;
  color:white;
  border-radius:0 10px 10px 0;
  cursor:pointer;
}

/* TEXT */
.top-search {
  font-size:13px;
  color:#ccc;
  margin-bottom:25px;
  line-height:1.6;
}

/* BUTTON */
.btn {
  width:160px;
  padding:12px;
  background:#ff6fa5;
  border-radius:10px;
  text-align:center;
  text-decoration:none;
  color:white;
}

/* RIGHT SIDE */
.right {
  width:50%;
  position:relative;
}

/* IMAGE */
.right img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* OVERLAY (EXACT EFFECT 🔥) */
.right::before {
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background:linear-gradient(
    90deg,
    #1e1e2f 0%,
    rgba(30,30,47,0.95) 25%,
    rgba(30,30,47,0.7) 50%,
    rgba(30,30,47,0.3) 75%,
    transparent 100%
  );
}

/* LEFT SIDE */
.left {
  width:50%;
  padding:50px;
  z-index:2;
}

/* RIGHT SIDE IMAGE */
.right {
  width:50%;
  position:relative;
}

/* IMAGE */
.right img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* OVERLAY (THIS IS THE MAGIC 🔥) */
.right::before {
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;

  /* GRADIENT OVER IMAGE */
  background:linear-gradient(
    90deg,
    #1e1e2f 0%,
    rgba(30,30,47,0.9) 30%,
    rgba(30,30,47,0.6) 55%,
    rgba(30,30,47,0.2) 75%,
    transparent 100%
  );
}
/* LEFT SIDE */
.left {
  width:50%;
}

.logo {
  font-size:50px;
  font-weight:bold;
  margin-bottom:20px;
}

.logo span {
  color:#ff6fa5;
}

/* SEARCH */
.search-box {
  display:flex;
  margin-bottom:15px;
}

.search-box input {
  width:70%;
  padding:12px;
  border:none;
  border-radius:10px 0 0 10px;
  font-size:14px;
}

.search-box button {
  padding:12px;
  border:none;
  background:#ff6fa5;
  color:white;
  border-radius:0 10px 10px 0;
  cursor:pointer;
}

/* TEXT */
.top-search {
  font-size:13px;
  color:#ccc;
  margin-bottom:20px;
}

/* BUTTON */
.btn {
  display:inline-block;
  padding:12px 20px;
  background:#ff6fa5;
  border-radius:10px;
  text-decoration:none;
  color:white;
}

/* RESPONSIVE */
@media(max-width:800px){
  .hero {
    flex-direction:column;
  }
  .left {
    width:100%;
  }
}
</style>

</head>

</html>
