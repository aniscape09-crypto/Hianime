<!DOCTYPE html>
<html>
<head>
<title>HiAnime</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(180deg,#1a1a2e,#0f0f1a);
  color:white;
}

/* NAVBAR */
.nav {
  display:flex;
  justify-content:center;
  gap:40px;
  padding:20px;
  font-size:15px;
}

.nav a {
  color:white;
  text-decoration:none;
}

/* HERO SECTION */
.hero {
  max-width:1100px;
  margin:40px auto;
  padding:40px;
  border-radius:20px;
  background:linear-gradient(90deg, rgba(20,20,40,0.9), rgba(20,20,40,0.4)),
             url('https://i.imgur.com/8Z5G5qT.jpg');
  background-size:cover;
  display:flex;
  align-items:center;
}

/* LEFT SIDE */
.left {
  width:50%;
}

.logo {
  font-size:50px;
  font-weight:bold;
  margin-bottom:20px;
}

.logo span {
  color:#ff6fa5;
}

/* SEARCH */
.search-box {
  display:flex;
  margin-bottom:15px;
}

.search-box input {
  width:70%;
  padding:12px;
  border:none;
  border-radius:10px 0 0 10px;
  font-size:14px;
}

.search-box button {
  padding:12px;
  border:none;
  background:#ff6fa5;
  color:white;
  border-radius:0 10px 10px 0;
  cursor:pointer;
}

/* TEXT */
.top-search {
  font-size:13px;
  color:#ccc;
  margin-bottom:20px;
}

/* BUTTON */
.btn {
  display:inline-block;
  padding:12px 20px;
  background:#ff6fa5;
  border-radius:10px;
  text-decoration:none;
  color:white;
}

/* RESPONSIVE */
@media(max-width:800px){
  .hero {
    flex-direction:column;
  }
  .left {
    width:100%;
  }
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <a href="#">Home</a>
  <a href="#">Movies</a>
  <a href="#">TV Series</a>
  <a href="#">Most Popular</a>
  <a href="#">Top Airing</a>
</div>

<!-- HERO -->
<div class="hero">

  <div class="left">

    <div class="logo">
      h<span>!</span>anime
    </div>

    <div class="search-box">
      <input type="text" placeholder="Search anime...">
      <button>🔍</button>
    </div>

    <div class="top-search">
      Top search: Solo Leveling Season 2 • One Piece • Blue Lock • Frieren • Shangri-La Frontier
    </div>

    <a href="home/index.html" class="btn">Watch anime ➜</a>

  </div>

</div>

</body>
</html>
