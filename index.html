<!DOCTYPE html>
<html>
<head>
<title>HiAnime Clone</title>

<style>
body {
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  margin:0;
}

/* HEADER */
.header {
  background:#1a1a1a;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

/* MAIN LAYOUT */
.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* PLAYER */
.player iframe {
  width:100%;
  height:450px;
  border-radius:10px;
}

/* INFO */
.info {
  display:flex;
  margin-top:20px;
}

.poster {
  width:200px;
  border-radius:10px;
}

.details {
  margin-left:20px;
}

/* EPISODES */
.episodes {
  margin-top:30px;
}

.ep-btn {
  display:inline-block;
  padding:8px 12px;
  margin:5px;
  background:#2a2a2a;
  border-radius:5px;
  cursor:pointer;
}

.ep-btn:hover {
  background:#ff3d3d;
}

/* ACTIVE BUTTON */
.active {
  background:#ff3d3d;
}
</style>

</head>

<body>

<div class="header">
  HiAnime 🔥
</div>

<div class="container">

  <!-- PLAYER -->
  <div class="player" id="player"></div>

  <!-- INFO -->
  <div class="info">
    <img class="poster" src="https://via.placeholder.com/200x300">

    <div class="details">
      <h2>Fullmetal Alchemist</h2>
      <p>Genre: Action, Adventure</p>
      <p>Status: Completed</p>
      <p>Watch all episodes in HD.</p>
    </div>
  </div>

  <!-- EPISODES -->
  <div class="episodes" id="episodes">

    <div class="ep-btn active" onclick="play(this, 'https://cucumbersaladblog.blogspot.com/2026/04/fullmetal-alchemist.html')">1</div>
    <div class="ep-btn" onclick="play(this, 'https://cucumbersaladblog.blogspot.com/2026/04/fullmetal-alchemist.html')">2</div>
    <div class="ep-btn" onclick="play(this, 'https://cucumbersaladblog.blogspot.com/2026/04/fullmetal-alchemist.html')">3</div>
    <div class="ep-btn" onclick="play(this, 'https://cucumbersaladblog.blogspot.com/2026/04/fullmetal-alchemist.html')">4</div>
    <div class="ep-btn" onclick="play(this, 'https://cucumbersaladblog.blogspot.com/2026/04/fullmetal-alchemist.html')">5</div>

  </div>

</div>

<script>
function play(btn, url){

  // Load video
  document.getElementById("player").innerHTML =
    '<iframe src="'+url+'" allowfullscreen></iframe>';

  // Remove active from all
  let buttons = document.querySelectorAll(".ep-btn");
  buttons.forEach(b => b.classList.remove("active"));

  // Add active to clicked
  btn.classList.add("active");
}

// Auto play first
play(document.querySelector(".ep-btn"), "https://cucumbersaladblog.blogspot.com/2026/04/fullmetal-alchemist.html");
</script>

</body>
</html>
